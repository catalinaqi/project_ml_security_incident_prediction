# ══════════════════════════════════════════════════════════════════════════════
# CLUSTERING PIPELINE CONFIGURATION
# ══════════════════════════════════════════════════════════════════════════════
# Purpose: CRISP-DM Phases 3-4-5 for unsupervised clustering analysis
# Inherits: base_pipeline_config.yml (Phase 2: Data Understanding)
# Problem Type: clustering (NO target column)
# Techniques: KMeans, DBSCAN (choose manually)
# Methodology: CRISP-DM
# ══════════════════════════════════════════════════════════════════════════════

clustering_pipeline_config:

  # ────────────────────────────────────────────────────────────────────────────
  # METADATA
  # ────────────────────────────────────────────────────────────────────────────
  metadata:
    pipeline_key:
      task: "clustering"
      version: "1.0"
      objective: "Unsupervised clustering without target variable. Phases 3-5."
      # QUESTION: ¿Evidence-level o Incident-level clustering?
      granularity: "evidence"  # TODO: Decide

  # ────────────────────────────────────────────────────────────────────────────
  # INHERITANCE
  # ────────────────────────────────────────────────────────────────────────────
  inherits_from: "base_pipeline_config"
  # Inherits:
  #   - common_base_config (runtime, output_policy, random_seed)
  #   - profiles (dev/prod with sample sizes)
  #   - phase2_data_understanding (complete)

  # ────────────────────────────────────────────────────────────────────────────
  # RUNTIME (Override base if needed)
  # ────────────────────────────────────────────────────────────────────────────
  runtime:
    # Hereda de base, override solo si necesario
    # random_seed: 7
    # output_root: "outputs"
    # overwrite_artifacts: true
    log_level: "DEBUG"  # Override para clustering

  # ────────────────────────────────────────────────────────────────────────────
  # PROFILES (Hereda de base)
  # ────────────────────────────────────────────────────────────────────────────
  # dev: 50k rows, prod: 200k rows
  # Stratify en IncidentGrade aunque clustering no lo use como target


  phases:
    # ════════════════════════════════════════════════════════════════════════════
    # PHASE 2: DATA UNDERSTANDING (Executed by base_pipeline)
    #"Describe, DO NOT transform. Alert, DO NOT remediate."
    # ════════════════════════════════════════════════════════════════════════════
    phase2_data_understanding:
      enabled: true
      # Already executed by base_pipeline_config
      # Artifacts available:
      #   - 2.1.data_acquisition.sample_train.parquet
      #   - 2.1.data_acquisition.sample_test.parquet
      #   - 2.2.schema_summary.json
      #   - 2.3.data_quality_assessment.quality_summary.json
      #   - 2.4.phase2_summary_report.json

    # ════════════════════════════════════════════════════════════════════════════
    # PHASE 3: DATA PREPARATION
    # Transform, DON'T just describe. Correct, DON'T just alert
    # ════════════════════════════════════════════════════════════════════════════
    phase3_data_preparation:
      enabled: true
      objective: "Transform raw data into modeling-ready features. 
                  Fit on train, transform on test."

      # QUESTION: ¿Combinar train+test para drift detection o mantener separados?
      read_strategy:
        mode: "sample"  # Hereda de profile activo
        combine_before_sampling: false  # TODO: Decide
        add_source_column: false  # true si necesitas diferenciar train/test después
        input_source: "${phases.phase2_data_understanding.steps.step_2_1_data_acquisition.output_artifacts.sample_train_parquet}"
        #input_source: "phase2_train"  # Lee de outputs de Phase 2

      steps:
        # ──────────────────────────────────────────────────────────────────────
        # STEP 3.1: DATA SELECTION
        # ──────────────────────────────────────────────────────────────────────
        step_3_1_data_selection:
          # 3.1 Data selection
          # Read sample from Stage 2. Filter by 'source' column.
          # Drop ID columns and constant features. Keep useful features for clustering.
          enabled: true
          methods:
            # ========================================
            # METHOD 1: Sentinel Removal
            # ========================================
            sentinel_removal:
              enabled: true
              techniques:
                bigint_cleanup:
                  enabled: true
                  params:
                    thresholds:
                      AccountUpn: 674000
                      IpAddress: 361000
                      DeviceId: 99000
                      Url: 150000
                      AccountSid: 442000
                      AccountObjectId: 426000
                      NetworkMessageId: 530000
                      FileName: 290000
                      Sha256: 139000
                    actions:
                      create_binary_flags: true
                      nullify_above_threshold: true
                      keep_real_values: true
                  output: "3.1.sentinel_removal.bigint_cleanup.json"
            # ========================
            # METHOD 2: DATASET DEFINITION
            # ========================
            dataset_definition:
              enabled: true
              techniques:
                manual_include_exclude:
                  enabled: true
                  params:
                    include: [ ]                    # Sin inclusiones forzadas
                    exclude:
                      - "ThreatFamily"              # 99% missing + leakage perfecto (Phase 2)
                  output: "3.1.dataset_definition.manual_include_exclude.json"
                drop_technical_columns:
                  enabled: true
                  params:
                    patterns: [ ]                   # Sin patrones genéricos
                    manual_exclude:
                      - "Id"
                      - "IncidentId"
                      - "AlertId"
                      - "IncidentGrade"             # Target (no usar en clustering)
                      - "ActionGrouped"             # Post-triage (missing >99%)
                      - "ActionGranular"            # Post-triage (missing >99%)
                      - "EmailClusterId"            # 98.96% missing (completeness report)
                      - "MitreTechniques"           # Multi-value, 57% missing
                      - "ThreatFamily"              # NUEVO: 99.19% missing + leakage 1.0
                  output: "3.1.dataset_definition.drop_technical_columns.json"
            # ========================
            # METHOD 3: FEATURE SELECTION
            # ========================
            feature_selection:
              enabled: true
              techniques:
                remove_constant_features:
                  enabled: true
                  params: { threshold_unique: 1 }
                  output: "3.1.feature_selection.remove_constant_features.json"
                  notes: "Phase 2: No columns have n_unique=1. Keep for safety."
                remove_duplicate_features:
                  enabled: true
                  params: { strategy: "exact" }
                  output: "3.1.feature_selection.remove_duplicate_features.json"
                  notes: "Phase 2: No exact duplicate columns. Keep for safety."
          # ========================
          # OUTPUTS FINAL STEP 3.1
          # ========================
          output_artifacts:
            final_features: "3.1.data_selection.final_features.json"       # Lista final después de TODOS los filtros
            overview_plot: "3.1.data_selection.overview.png"               # Sankey/waterfall de reducción de features
        # ──────────────────────────────────────────────────────────────────────
        # STEP 3.2: DATA CLEANING
        # ──────────────────────────────────────────────────────────────────────
        step_3_2_data_cleaning:
          # Fit imputation and outlier handling ONLY on train rows.
          # Apply same transformers to both train and test for consistency.
          enabled: true
          methods:
            # ========================
            # METHOD 1: MISSING DATA
            # ========================
            missing_data_handling:
              enabled: true
              selection_policy:
                numeric_imputer: "median_imputation"     # Para BIGINT reales nullificadas
                categorical_imputer: "mode_imputation"   # Para SuspicionLevel, LastVerdict y demás object
              techniques:
                median_imputation:
                  enabled: true
                  params: { numeric_only: true }
                  output: "3.2.missing_data_handling.median_imputation.values.json"
                  notes: >
                    Imputa AccountUpn_real, IpAddress_real, AccountSid_real, etc.
                    (sentinel-nullificadas en step 3.1). Mediana estimada de los valores reales.
                mode_imputation:
                  enabled: true
                  params: { for_categoricals: true }
                  output: "3.2.missing_data_handling.mode_imputation.values.json"
                  notes: >
                    Imputa SuspicionLevel (84.88% missing → modo "Suspicious"),
                    LastVerdict (76.5% → modo "Suspicious").
                    Columnas >95% missing (ResourceType, AntispamDirection, Roles) ya excluidas en step 3.1.
            # ========================
            # METHOD 2: OUTLIERS
            # ========================
            outlier_handling:
              enabled: true
              techniques:
                winsorization:
                  enabled: false
                  params: { limits: [ 0.01, 0.01 ] }
                iqr_clipping:
                  enabled: true
                  params:
                    k: 1.5
                    exclude_columns:
                      # BIGINT pseudo-categóricas (originales + flags de missing)
                      - "DetectorId"
                      - "AlertTitle"
                      - "OrgId"
                      - "IpAddress"
                      - "Sha256"
                      - "FileName"
                      - "AccountUpn"
                      - "AccountSid"
                      - "AccountObjectId"
                      - "DeviceId"
                      - "NetworkMessageId"
                      - "Url"
                      - "AccountName"
                      - "DeviceName"
                      - "FolderPath"
                      - "City"
                      - "AccountUpn_is_missing"
                      - "IpAddress_is_missing"
                      - "DeviceId_is_missing"
                      - "AccountSid_is_missing"
                      - "AccountObjectId_is_missing"
                      - "NetworkMessageId_is_missing"
                      - "FileName_is_missing"
                      - "Sha256_is_missing"
                      # Columnas de código (no continuas)
                      - "RegistryKey"
                      - "RegistryValueName"
                      - "RegistryValueData"
                      - "ApplicationId"
                      - "ApplicationName"
                      - "OAuthApplicationId"
                      - "ResourceIdName"
                      - "OSFamily"
                      - "OSVersion"
                      - "CountryCode"
                      - "State"
                      # Columnas ordinales (se codifican en 3.3)
                      - "SuspicionLevel"
                      - "LastVerdict"
                      # Columnas object (no numéricas)
                      - "Category"
                      - "EntityType"
                      - "EvidenceRole"
                      - "ResourceType"
                      - "AntispamDirection"
                      - "Roles"
                      # Timestamp (datetime)
                      - "Timestamp"
                  output: "3.2.outlier_handling.iqr_clipping.impact.png"
                  notes: >
                    Excluidas ~40 columnas: BIGINT pseudo-categóricas y sus flags,
                    columnas con sentinel 0 (CountryCode, OSVersion), códigos (Registry*, Application*),
                    ordinales (SuspicionLevel, LastVerdict), y no numéricas.
                    Solo columnas verdaderamente continuas (hour, n_evidences*, etc.)
                    serán evaluadas para clipping.
                zscore_filtering:
                  enabled: false
                  params: { threshold: 3.0 }
            # ========================
            # METHOD 3: TRANSFORMATIONS
            # ========================
            robust_transformations:
              enabled: false
              techniques:
                log_transform:
                  enabled: false
                  params:
                    shift_if_needed: true
                    columns: [ "DetectorId", "AlertTitle", "OrgId" ]
                    output: "3.2.robust_transformations.log_transform.distributions.png"
                  notes: >
                    Disabled: DetectorId, AlertTitle, OrgId are pseudo-categorical IDs,
                    not continuous. Log transform would be meaningless. Apply log to
                    count features (n_evidences*, etc.) in step 3.3 if needed.
                box_cox:
                  enabled: false
                  params: { }
                  notes: "Disabled: no continuous positive variables at this stage."
                yeo_johnson:
                  enabled: false
                  params: { }
                  notes: "Disabled: no continuous variables requiring Yeo-Johnson."
            # ========================
            # METHOD 4: CATEGORICAL NOISE
            # ========================
            categorical_noise:
              enabled: true
              techniques:
                fix_typos:
                  enabled: false                        # ← CAMBIO: deshabilitado
                  params: { lowercase: true, regex_cleanup: true }
                  notes: >
                    Disabled: object columns (Category, EntityType, etc.) are clean
                    from Phase 2. Lowercasing could cause drift with test data.
                text_normalization:
                  enabled: false                        # ← CAMBIO: deshabilitado
                  params: { remove_accents: true }
                  notes: >
                    Disabled: no accented characters found in Phase 2.
                rare_grouping:
                  enabled: true
                  params:
                    min_freq: 0.001                      # Se mantiene (0.1% para 200k filas)
                    exclude_columns: [ ]
                  output: "3.2.categorical_noise.rare_grouping.map.json"
                  notes: >
                    Mantiene solo categorías con >=200 apariciones. Agrupa raras como
                    'Blob'(7), 'CredentialStealing'(8). Adecuado para clustering.
            # ========================
            # METHOD 5: DUPLICATES
            # ========================
            duplicate_handling:
              enabled: true
              techniques:
                exact_duplicates:                # Única técnica necesaria
                  enabled: true
                  params:
                    subset: null                 # Todas las columnas (después de imputación/rare grouping)
                    keep: "first"                # Conservar la primera ocurrencia
                  output: "3.2.duplicate_handling.exact_duplicates.removed.json"
                  notes: >
                    Elimina filas idénticas en todas las columnas. Aplica después de
                    imputación y rare grouping. Phase 2 mostró 53% duplicados basados
                    en Id, pero esto puede deberse a Id repetidos; exact_duplicates
                    con subset=null es más preciso para clustering.
          # ========================
          # OUTPUTS FINAL STEP 3.2
          # ========================
          output_artifacts:
            imputation_consolidated: "3.2.data_cleaning.imputation_summary.json"
            missing_before_after: "3.2.data_cleaning.missing_comparison.png"
            outlier_consolidated: "3.2.data_cleaning.outlier_summary.json"       # ← nuevo
            categorical_consolidated: "3.2.data_cleaning.categorical_summary.json"
            duplicate_consolidated: "3.2.data_cleaning.duplicate_summary.json"  # ← nuevo
            cleaning_summary: "3.2.data_cleaning.cleaning_report.json"
        # ──────────────────────────────────────────────────────────────────────
        # STEP 3.3: DATA TRANSFORMATION
        # ──────────────────────────────────────────────────────────────────────
        step_3_3_data_transformation:
          enabled: true
          methods:
            # 1. Primero: feature engineering (groupby por IncidentId)
            feature_engineering:
              enabled: true
              techniques:
                groupby_aggregations:
                  enabled: true
                  params:
                    groupby_column: "IncidentId"
                    aggregations:
                      n_evidences_per_incident:
                        column: "IncidentId"
                        method: "size"
                      n_alerts_per_incident:
                        column: "AlertId"
                        method: "nunique"
                      n_unique_entity_types:
                        column: "EntityType"
                        method: "nunique"
                  output: "3.3.feature_engineering.groupby_aggregations.stats.json"

            # 2. Luego: numeric_scaling para las nuevas features continuas
            numeric_scaling:
              enabled: true
              techniques:
                standard_scaling:
                  enabled: true
                  params:
                    columns:
                      - "n_evidences_per_incident"
                      - "n_alerts_per_incident"
                      - "n_unique_entity_types"
                  output: "3.3.numeric_scaling.standard_scaling.statistics.json"

            # 3. Feature scaling (frequency_encoding para pseudo-categóricas)
            feature_scaling:
              enabled: true
              techniques:
                frequency_encoding:
                  enabled: true
                  params:
                    columns:
                      - "Category"
                      - "EntityType"
                      - "EvidenceRole"
                      - "OSFamily"
                      - "DetectorId"
                      - "AlertTitle"
                      - "OrgId"
                      - "AccountUpn_real"
                      - "IpAddress_real"
                    fillna_value: 0
                  output: "3.3.feature_scaling.frequency_encoding.dictionary.json"

            # 4. Encoding ordinal
            encoding:
              enabled: true
              techniques:
                ordinal_encoding:
                  enabled: true
                  params:
                    columns:
                      - "SuspicionLevel"
                      - "LastVerdict"
                    categories:
                      SuspicionLevel: ["Low", "Medium", "High"]
                      LastVerdict: ["Unknown", "Clean", "Suspicious", "Malicious"]
                  output: "3.3.encoding.ordinal_encoding.mappings.json"

            # 5. Temporal features
            temporal_features:
              enabled: true
              techniques:
                datetime_extraction:
                  enabled: true
                  params:
                    column: "Timestamp"
                    extract:
                      - "hour"
                    drop_original: true
                  output: "3.3.temporal_features.datetime_extraction.distribution.png"
          # ========================
          # OUTPUTS FINAL STEP 3.3
          # ========================
          output_artifacts:
            scaling_consolidated: "3.3_data_transformation.scaling_summary.json"
            frequency_encoding_stats: "3.3_data_transformation.frequency_encoding.dictionary.json"   # ← NUEVO
            encoding_consolidated: "3.3_data_transformation.encoding_summary.json"
            ordinal_encoding_mappings: "3.3_data_transformation.ordinal_encoding.mappings.json"       # ← NUEVO (más específico)
            engineered_features_stats: "3.3_data_transformation.engineering_stats.json"
            temporal_distribution: "3.3_data_transformation.temporal_viz.png"
            temporal_stats: "3.3_data_transformation.hour_distribution.json"                          # ← NUEVO (complemento numérico)
            columns_dropped: "3.3_data_transformation.dropped_columns.json"                           # ← NUEVO (Timestamp original)
            final_feature_schema: "3.3_data_transformation.final_feature_schema.json"                 # ← NUEVO (lista final de columnas con dtypes)
            transformation_summary: "3.3_data_transformation.transformation_report.json"
        # ──────────────────────────────────────────────────────────────────────
        # STEP 3.5: DATA INTEGRATION
        # ──────────────────────────────────────────────────────────────────────
#        step_3_4_data_integration:
#          # Optional: merge external data or align temporal records.
#          # Disabled by default; enable only if you have enrichment data sources.
#          enabled: false
#          methods:
#            data_integration:
#              techniques:
#                dataset_merging:
#                  enabled: false
#                  params: { how: "inner", on: [ ] }
#                union_concat:
#                  enabled: false
#                  params: { axis: 0 }
#                feature_alignment:
#                  enabled: false
#                  params:
#                    column_renaming: { }
#                    datatype_harmonization: true
#                    column_selection: [ ]
#                key_resolution:
#                  enabled: false
#                  params:
#                    surrogate_keys: false
#                granularity_alignment:
#                  enabled: false
#                  params: { }
#                temporal_alignment:
#                  enabled: false
#                  params: { }
#                data_enrichment:
#                  enabled: false
#                  params:
#                    lookup_tables: [ ]
#          output_artifacts:
#            integration_report: "integration_report.json"      # Merge stats if enabled
#            alignment_report: "alignment_report.json"          # Alignment status if enabled
        # ──────────────────────────────────────────────────────────────────────
        # STEP 3.5: DATA FORMATTING
        # ──────────────────────────────────────────────────────────────────────
        step_3_5_data_formatting:
          # Convert prepared data to final format (numpy arrays, parquet files).
          # Save train and test parquets. Serialize transformers pipeline for Stage 4-5.
          enabled: true
          methods:
            # ========================
            # METHOD 1: DATA SPLIT
            # ========================
            data_split:
              enabled: true
              techniques:
                no_split_clustering:
                  enabled: true
                  params: { }
                # RESULTADO: Un log confirmando que se mantuvo la separación por la columna 'source'.
            # ========================
            # METHOD 2: DATASET FORMATTING
            # ========================
            dataset_formatting:
              enabled: false # update from true -> false
              techniques:
                x_y_separation:
                  enabled: false         # NOT applicable to clustering
                  params: { target_col: null } # params: { target_col: "${target_col}" }
                type_casting:
                  enabled: true
                  params: { }
                # RESULTADO: Reporte de dtypes (asegurar que todo sea float/int para el modelo).
                array_conversion:
                  enabled: false
                  params: { to_numpy: false }
                sparse_dense_format:
                  enabled: false
                  params: { format: "sparse" }
                reshaping:
                  enabled: false
                  params: { }
          # ========================
          # OUTPUTS FINAL STEP 3.5
          # ========================
          output_artifacts:
            # --- DATA FINAL ---
            train_prepared: "3.5.data_formatting.a_train_prepared_150k.parquet"
            test_prepared: "3.5.data_formatting.b_test_prepared_50k.parquet"

            # --- GROUND TRUTH PARA VALIDACIÓN ---
            train_labels: "3.5.data_formatting.c_train_incident_grade.npy"
            test_labels: "3.5.data_formatting.d_test_incident_grade.npy"

            # --- EL CEREBRO DEL PIPELINE ---
            transformers_pipeline: "3.5.data_formatting.e_transformers_pipeline.pkl"

            # --- METADATOS DE CONTROL ---
            data_schema_final: "3.5.data_formatting.f_final_schema_report.json"
            pipeline_integrity_check: "3.5.data_formatting.g_serialization_log.json"
#
#            # Formato
#            format: "parquet"
#            compression: "snappy"

    # ════════════════════════════════════════════════════════════════════════════
    # PHASE 4: MODELING
    # ════════════════════════════════════════════════════════════════════════════
    phase4_data_modeling:
      enabled: true
      objective: "Train and optimize clustering algorithms"

      read_strategy:
        input_source: "3.5.data_formatting.train_prepared.parquet"

      steps:
        # ──────────────────────────────────────────────────────────────────────
        # STEP 4.1: ALGORITHM SELECTION
        # ──────────────────────────────────────────────────────────────────────
        step_4_1_algorithm_selection:
          enabled: true
          description: "Select clustering techniques to train"

          methods:
            algorithm_selection:
              techniques:
                # QUESTION: ¿Habilitar KMeans, DBSCAN, ambos, o agregar Hierarchical?
                kmeans:
                  enabled: true  # TODO: Choose
                  priority: 1
                  # OUTPUT: 4.1.algorithm_selection.kmeans.json

                dbscan:
                  enabled: false  # TODO: Choose
                  priority: 2
                  # OUTPUT: 4.1.algorithm_selection.dbscan.json

        # ──────────────────────────────────────────────────────────────────────
        # STEP 4.2: MODEL TRAINING
        # ──────────────────────────────────────────────────────────────────────
        step_4_2_model_training:
          enabled: true
          description: "Train models with hyperparameter tuning"

          methods:
            model_training:
              techniques:
                fit:
                  enabled: true
                  params:
                    fit_best_only: true
                    store_all_models: false
                  # OUTPUT: 4.2.model_training.{technique}.pkl

                hyperparameter_tuning:
                  enabled: true
                  params:
                    strategy: "grid"  # TODO: grid or random
                    scoring: "silhouette"  # TODO: silhouette, davies_bouldin, calinski
                    refit: true

                    # QUESTION: ¿Qué rangos de hiperparámetros explorar?
                    grids:
                      kmeans:
                        n_clusters: []  # TODO: [2, 3, 4, 5, 6, 7, 8]
                        init: ["k-means++"]
                        max_iter: [300]
                        # OUTPUT: 4.2.model_training.kmeans.grid_results.json

                      dbscan:
                        eps: []  # TODO: [0.3, 0.5, 0.8, 1.0]
                        min_samples: []  # TODO: [3, 5, 10]
                        metric: ["euclidean"]
                        # OUTPUT: 4.2.model_training.dbscan.grid_results.json

        # ──────────────────────────────────────────────────────────────────────
        # STEP 4.3: TEST DESIGN GENERATION
        # ──────────────────────────────────────────────────────────────────────
        step_4_3_test_design:
          enabled: true
          description: "Document evaluation strategy"
          # OUTPUT: 4.3.test_design.evaluation_plan.json
          # Expected: {metrics: [], validation_approach: ""}

        # ──────────────────────────────────────────────────────────────────────
        # STEP 4.4: MODEL EVALUATION
        # ──────────────────────────────────────────────────────────────────────
        step_4_4_model_evaluation:
          enabled: true
          description: "Evaluate clustering quality"

          methods:
            model_evaluation:
              techniques:
                # Unsupervised Metrics
                silhouette:
                  enabled: true
                  params:
                    sample_size: 20000  # TODO: Adjust for performance
                    metric: "euclidean"
                  # OUTPUT: 4.4.model_evaluation.silhouette.json
                  # Expected: {score: float, per_cluster: []}

                davies_bouldin:
                  enabled: true
                  # OUTPUT: 4.4.model_evaluation.davies_bouldin.json
                  # Expected: {score: float} (lower is better)

                calinski_harabasz:
                  enabled: true
                  # OUTPUT: 4.4.model_evaluation.calinski_harabasz.json
                  # Expected: {score: float} (higher is better)

                # QUESTION: ¿Incluir métricas supervisadas usando IncidentGrade?
                adjusted_rand_index:
                  enabled: false  # TODO: Enable if comparing with ground truth
                  params:
                    ground_truth_column: "IncidentGrade"
                  # OUTPUT: 4.4.model_evaluation.adjusted_rand_index.json
                  # Expected: {ari_score: float, contingency_table: {}}

                # Cluster Profiling
                cluster_profiling:
                  enabled: true
                  params:
                    samples_per_cluster: 100
                  # OUTPUT: 4.4.model_evaluation.cluster_profiling.json
                  # Expected: {cluster_id: {size, centroid, top_features}}

    # ════════════════════════════════════════════════════════════════════════════
    # PHASE 5: EVALUATION & INTERPRETATION
    # ════════════════════════════════════════════════════════════════════════════
    phase5_evaluation_and_interpretation:
      enabled: true
      objective: "Extract insights and validate business value"

      steps:
        # ──────────────────────────────────────────────────────────────────────
        # STEP 5.1: KNOWLEDGE EXTRACTION
        # ──────────────────────────────────────────────────────────────────────
        step_5_1_interpretation:
          enabled: true
          description: "Interpret cluster characteristics"
