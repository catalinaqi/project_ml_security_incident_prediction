# ══════════════════════════════════════════════════════════════════════════════
# CLUSTERING PIPELINE CONFIGURATION
# ══════════════════════════════════════════════════════════════════════════════
# Purpose: CRISP-DM Phases 3-4-5 for unsupervised clustering analysis
# Inherits: base_pipeline_config.yml (Phase 2: Data Understanding)
# Problem Type: clustering (NO target column)
# Techniques: KMeans, DBSCAN (choose manually)
# Methodology: CRISP-DM
# ══════════════════════════════════════════════════════════════════════════════

clustering_pipeline_config:

  # ────────────────────────────────────────────────────────────────────────────
  # METADATA
  # ────────────────────────────────────────────────────────────────────────────
  metadata:
    pipeline_key:
      task: "clustering"
      version: "1.0"
      objective: "Unsupervised clustering without target variable. Phases 3-5."
      # QUESTION: ¿Evidence-level o Incident-level clustering?
      granularity: "evidence"  # TODO: Decide

  # ────────────────────────────────────────────────────────────────────────────
  # INHERITANCE
  # ────────────────────────────────────────────────────────────────────────────
  inherits_from: "base_pipeline_config"
  # Inherits:
  #   - common_base_config (runtime, output_policy, random_seed)
  #   - profiles (dev/prod with sample sizes)
  #   - phase2_data_understanding (complete)

  # ────────────────────────────────────────────────────────────────────────────
  # RUNTIME (Override base if needed)
  # ────────────────────────────────────────────────────────────────────────────
  runtime:
    # Hereda de base, override solo si necesario
    # random_seed: 7
    # output_root: "outputs"
    # overwrite_artifacts: true
    log_level: "DEBUG"  # Override para clustering

  # ────────────────────────────────────────────────────────────────────────────
  # PROFILES (Hereda de base)
  # ────────────────────────────────────────────────────────────────────────────
  # dev: 50k rows, prod: 200k rows
  # Stratify en IncidentGrade aunque clustering no lo use como target


  phases:
    # ════════════════════════════════════════════════════════════════════════════
    # PHASE 2: DATA UNDERSTANDING (Executed by base_pipeline)
    #"Describe, DO NOT transform. Alert, DO NOT remediate."
    # ════════════════════════════════════════════════════════════════════════════
    phase2_data_understanding:
      enabled: true
      # Already executed by base_pipeline_config
      # Artifacts available:
      #   - 2.1.data_acquisition.sample_train.parquet
      #   - 2.1.data_acquisition.sample_test.parquet
      #   - 2.2.schema_summary.json
      #   - 2.3.data_quality_assessment.quality_summary.json
      #   - 2.4.phase2_summary_report.json

    # ════════════════════════════════════════════════════════════════════════════
    # PHASE 3: DATA PREPARATION
    # Transform, DON'T just describe. Correct, DON'T just alert
    # ════════════════════════════════════════════════════════════════════════════
    phase3_data_preparation:
      enabled: true
      objective: "Transform raw data into modeling-ready features. 
                  Fit on train, transform on test."

      # QUESTION: ¿Combinar train+test para drift detection o mantener separados?
      read_strategy:
        mode: "sample"  # Hereda de profile activo
        combine_before_sampling: false  # TODO: Decide
        add_source_column: false  # true si necesitas diferenciar train/test después
        input_source: "${phases.phase2_data_understanding.steps.step_2_1_data_acquisition.output_artifacts.sample_train_parquet}"
        #input_source: "phase2_train"  # Lee de outputs de Phase 2

      steps:
        # ──────────────────────────────────────────────────────────────────────
        # STEP 3.1: DATA SELECTION
        # ──────────────────────────────────────────────────────────────────────
        step_3_1_data_selection:
          enabled: true
          methods:

            sentinel_removal:
              enabled: true
              techniques:
                bigint_cleanup:
                  enabled: true
                  params:
                    thresholds:
                      AccountUpn: 674000
                      IpAddress: 361000
                      DeviceId: 99000
                      Url: 150000
                      AccountSid: 442000
                      AccountObjectId: 426000
                      NetworkMessageId: 530000
                      FileName: 290000
                      Sha256: 139000
                      AlertTitle: 10000      # ← NUEVO: confirmado bigint_hashed en fase 2
                    actions:
                      create_binary_flags: true
                      nullify_above_threshold: true
                      keep_real_values: true
                      include_real_in_output: true   # ← NUEVO: garantiza que _real llegue a final_features
                  output: "3.1.sentinel_removal.bigint_cleanup.json"

            dataset_definition:
              enabled: true
              techniques:
                manual_include_exclude:
                  enabled: true
                  params:
                    include: [ ]
                    exclude:
                      - "ThreatFamily"
                  output: "3.1.dataset_definition.manual_include_exclude.json"

                drop_technical_columns:
                  enabled: true
                  params:
                    manual_exclude:
                      - "Id"
                      - "IncidentGrade"          # target — no entra en clustering
                      - "ActionGrouped"          # post-triage, >99% missing
                      - "ActionGranular"         # post-triage, >99% missing
                      - "EmailClusterId"         # 98.96% missing
                      - "MitreTechniques"        # multi-value, 57% missing, sin explotar
                      - "ThreatFamily"           # leakage confirmado fase 2
                      - "Usage"                  # add because find F2
                    keep_for_aggregation: # ← NUEVO: protegidos hasta post-aggregation en 3.3
                      - "IncidentId"             # clave groupby en 3.3
                      - "AlertId"                # para n_alerts_per_incident en 3.3
                      - "EntityType"             # para n_unique_entity_types en 3.3
                      - "IncidentGrade" # retenida para stratified shuffle en 3.5, dropeada ANTES de array_conversion
                    leakage_risk_flag: # ← NUEVO: confirmado suspect_leakage en fase 2
                      - "SuspicionLevel"
                      - "LastVerdict"
                  output: "3.1.dataset_definition.drop_technical_columns.json"

            feature_selection:
              enabled: true
              techniques:
                remove_constant_features:
                  enabled: true
                  params: { threshold_unique: 1 }
                  output: "3.1.feature_selection.remove_constant_features.json"
                remove_duplicate_features:
                  enabled: true
                  params: { strategy: "exact" }
                  output: "3.1.feature_selection.remove_duplicate_features.json"

          output_artifacts:
            final_features: "3.1.data_selection.final_features.json"
            overview_plot: "3.1.data_selection.overview.png"
        # ──────────────────────────────────────────────────────────────────────
        # STEP 3.2: DATA CLEANING
        # ──────────────────────────────────────────────────────────────────────
        step_3_2_data_cleaning:
          enabled: true
          methods:

            missing_data_handling:
              enabled: true
              selection_policy:
                numeric_imputer: "median_imputation"
                categorical_imputer: "mode_imputation"
              techniques:
                median_imputation:
                  enabled: true
                  params:
                    numeric_only: true
                    exclude_columns:          # ← NUEVO: excluir BIGINTs explícitamente
                      - "AccountUpn"          # BIGINT — sin valores reales separados
                      - "IpAddress"           # BIGINT
                      - "DeviceId"            # BIGINT
                      - "AccountSid"          # BIGINT
                      - "AccountObjectId"     # BIGINT
                      - "NetworkMessageId"    # BIGINT
                      - "FileName"            # BIGINT
                      - "Sha256"              # BIGINT
                      - "Url"                 # BIGINT nullificado en 3.1 — no imputar
                      - "AlertTitle"          # BIGINT nullificado en 3.1 — no imputar
                      - "DetectorId"          # BIGINT
                      - "OrgId"               # BIGINT/pseudo-categórico
                      - "ApplicationId"       # pseudo-categórico
                      - "OAuthApplicationId"  # pseudo-categórico
                  output: "3.2.missing_data_handling.median_imputation.values.json"
                  notes: >
                    Con 3.1 corregido, no existen columnas _real separadas.
                    BIGINTs originales excluidos explícitamente — imputar un ID
                    con mediana no tiene sentido semántico. Si no quedan columnas
                    numéricas continuas con missing, este paso no imputa nada
                    y lo registra en el output.

                mode_imputation:
                  enabled: true
                  params: { for_categoricals: true }
                  columns: ["LastVerdict"]
                  add_missing_flags:
                    - "LastVerdict_is_missing"
                    - "SuspicionLevel_is_missing"
                  output: "3.2.missing_data_handling.mode_imputation.values.json"
                  notes: >
                    SuspicionLevel: 84.88% missing, solo 2 valores → no imputar,
                    crear flag. LastVerdict: imputar con moda (Suspicious) + flag.

            outlier_handling:
              enabled: false
              notes: >
                Sin columnas continuas reales en este step. IQR clipping
                se aplica en 3.3 post-feature engineering sobre
                n_evidences_per_incident, n_alerts_per_incident,
                n_unique_entity_types y Timestamp_hour.

            robust_transformations:
              enabled: false
              notes: >
                Sin variables continuas que requieran transformación en este step.

            categorical_noise:
              enabled: true
              techniques:
                fix_typos:
                  enabled: false
                text_normalization:
                  enabled: false
                sentinel_cleanup:
                  enabled: true
                  params:
                    columns:
                      OSFamily:
                        sentinel_value: 0
                        replace_with: null
                  output: "3.2.categorical_noise.sentinel_cleanup.json"
                  notes: >
                    OSFamily==0 (~3,826 filas) es sentinel. Se nullifica
                    antes de rare_grouping.
                rare_grouping:
                  enabled: true
                  params:
                    min_freq: 0.001
                    unseen_category: "OTHER"
                    exclude_columns:          # ← NUEVO: excluir BIGINTs nullificados
                      - "Url"                 # nullificado en 3.1, no es categórico string
                      - "AlertTitle"          # nullificado en 3.1, no es categórico string
                      - "Url_is_missing"      # binaria, no categórica
                      - "AlertTitle_is_missing" # binaria, no categórica
                  output: "3.2.categorical_noise.rare_grouping.json"
                  notes: >
                    Procesa columnas object reales: Category, EntityType, EvidenceRole,
                    ResourceType, Roles, AntispamDirection, SuspicionLevel, LastVerdict,
                    OSFamily (post-sentinel_cleanup). Excluye BIGINTs nullificados y
                    flags binarias.

            duplicate_handling:
              enabled: true
              techniques:
                exact_duplicates:
                  enabled: true
                  params:
                    subset: null
                    keep: "first"
                  output: "3.2.duplicate_handling.exact_duplicates.removed.json"

          output_artifacts:
            imputation_consolidated: "3.2.data_cleaning.imputation_summary.json"
            missing_before_after: "3.2.data_cleaning.missing_comparison.png"
            outlier_consolidated: "3.2.data_cleaning.outlier_summary.json"
            categorical_consolidated: "3.2.data_cleaning.categorical_summary.json"
            duplicate_consolidated: "3.2.data_cleaning.duplicate_summary.json"
            cleaning_summary: "3.2.data_cleaning.cleaning_report.json"
        # ──────────────────────────────────────────────────────────────────────
        # STEP 3.3: DATA TRANSFORMATION
        # ──────────────────────────────────────────────────────────────────────
        step_3_3_data_transformation:
          enabled: true
          methods:

            # 1. Feature engineering — PRIMERO para crear columnas antes de escalar
            feature_engineering:
              enabled: true
              techniques:
                groupby_aggregations:
                  enabled: true
                  params:
                    groupby_column: "IncidentId"
                    aggregations:
                      n_evidences_per_incident:
                        column: "IncidentId"
                        method: "size"
                      n_alerts_per_incident:
                        column: "AlertId"
                        method: "nunique"
                      n_unique_entity_types:
                        column: "EntityType"
                        method: "nunique"
                  output: "3.3.feature_engineering.groupby_aggregations.stats.json"

            # 2. Temporal — ANTES de numeric_scaling para que Timestamp_hour exista
            temporal_features:
              enabled: true
              techniques:
                datetime_extraction:
                  enabled: true
                  params:
                    column: "Timestamp"
                    extract:
                      - "hour"
                    drop_original: true
                  output: "3.3.temporal_features.datetime_extraction.distribution.png"

            # 3. Numeric scaling — engineeradas + Timestamp_hour juntas
            numeric_scaling:
              enabled: true
              techniques:
                standard_scaling:
                  enabled: true
                  params:
                    columns:
                      - "n_evidences_per_incident"
                      - "n_alerts_per_incident"
                      - "n_unique_entity_types"
                      - "Timestamp_hour"       # rango 0-23 → escalar para KMeans
                  fit_on: "train"
                  output: "3.3.numeric_scaling.standard_scaling.statistics.json"

            # 4. Frequency encoding — cardinalidad alta, fit en train
            feature_scaling:
              enabled: true
              techniques:
                frequency_encoding:
                  enabled: true
                  params:
                    columns:
                      - "Category"
                      - "EntityType"
                      - "EvidenceRole"
                      - "OSFamily"
                      - "DetectorId"
                      - "AlertTitle_real"     # ← _real confirmada en bigint_cleanup
                      - "OrgId"
                      - "AccountUpn"          # ← BIGINT original, nullified_count=0
                      - "IpAddress"           # ← BIGINT original, nullified_count=0
                    fillna_value: 0
                    fit_on: "train"
                  output: "3.3.feature_scaling.frequency_encoding.dictionary.json"

            # 5. Ordinal encoding — orden semántico explícito
            encoding:
              enabled: true
              techniques:
                ordinal_encoding:
                  enabled: true
                  params:
                    columns:
                      - "SuspicionLevel"
                      - "LastVerdict"
                    categories:
                      SuspicionLevel: [ "Low", "Medium", "High" ]
                      LastVerdict: [ "Unknown", "Clean", "Suspicious", "Malicious" ]
                    leakage_risk: "high"      # confirmado suspect_leakage fase 2
                  output: "3.3.encoding.ordinal_encoding.mappings.json"
                one_hot_encoding: # req: elegir otra tecnica div
                  enabled: true
                  params:
                target_encoding:
                  enabled: false
                frequency_encoding:
                  enabled: false

            # 6. Column dropping — post-aggregation y sin señal
            column_dropping:
              enabled: true
              techniques:
                explicit_drop:
                  enabled: true
                  params:
                    columns:
                      - "Url"                   # BIGINT nullificado, Url_real es la útil
                      - "AlertTitle"            # BIGINT nullificado, AlertTitle_real es la útil
                      - "AlertTitle_is_missing" # redundante: AlertTitle ya nullificado
                      - "IncidentId"            # clave de aggregation, no feature
                      - "AlertId"               # usada en aggregation, no feature
                    reason: "identifier_or_redundant_post_aggregation"
                  output: "3.3.column_dropping.dropped_columns.json"

            # 7. Missing flags — señal binaria para clustering
            missing_flags:
              enabled: true
              techniques:
                passthrough:
                  enabled: true
                  params:
                    columns:
                      - "LastVerdict_is_missing"
                      - "SuspicionLevel_is_missing"
                      - "Url_is_missing"        # ausencia de URL puede discriminar TP/FP
                    note: "Binary 0/1 — no scaling needed, preserved as clustering signal"
                  output: "3.3.missing_flags.passthrough.json"
          output_artifacts:
            scaling_consolidated: "3.3_data_transformation.scaling_summary.json"
            frequency_encoding_stats: "3.3_data_transformation.frequency_encoding.dictionary.json"
            encoding_consolidated: "3.3_data_transformation.encoding_summary.json"
            ordinal_encoding_mappings: "3.3_data_transformation.ordinal_encoding.mappings.json"
            engineered_features_stats: "3.3_data_transformation.engineering_stats.json"
            temporal_distribution: "3.3_data_transformation.temporal_viz.png"
            temporal_stats: "3.3_data_transformation.hour_distribution.json"
            columns_dropped: "3.3_data_transformation.dropped_columns.json"
            final_feature_schema: "3.3_data_transformation.final_feature_schema.json"
            transformation_summary: "3.3_data_transformation.transformation_report.json"
        # ──────────────────────────────────────────────────────────────────────
        # STEP 3.5: DATA INTEGRATION
        # ──────────────────────────────────────────────────────────────────────
#        step_3_4_data_integration:
#          # Optional: merge external data or align temporal records.
#          # Disabled by default; enable only if you have enrichment data sources.
#          enabled: false
#          methods:
#            data_integration:
#              techniques:
#                dataset_merging:
#                  enabled: false
#                  params: { how: "inner", on: [ ] }
#                union_concat:
#                  enabled: false
#                  params: { axis: 0 }
#                feature_alignment:
#                  enabled: false
#                  params:
#                    column_renaming: { }
#                    datatype_harmonization: true
#                    column_selection: [ ]
#                key_resolution:
#                  enabled: false
#                  params:
#                    surrogate_keys: false
#                granularity_alignment:
#                  enabled: false
#                  params: { }
#                temporal_alignment:
#                  enabled: false
#                  params: { }
#                data_enrichment:
#                  enabled: false
#                  params:
#                    lookup_tables: [ ]
#          output_artifacts:
#            integration_report: "integration_report.json"      # Merge stats if enabled
#            alignment_report: "alignment_report.json"          # Alignment status if enabled
        # ──────────────────────────────────────────────────────────────────────
        # STEP 3.5: DATA FORMATTING
        # ──────────────────────────────────────────────────────────────────────
        step_3_5_data_formatting:
          enabled: true
          methods:

            data_split:
              enabled: true
              techniques:
                no_split_clustering:
                  enabled: true
                  params:
                    random_state: 7          # ← CORREGIDO: consistente con random_seed global
                    shuffle: true
                    strategy: "stratified"
                    stratify_column: "IncidentGrade" # drop post-shuffle antes de array_conversion
                  output: "3.5.data_split.no_split_clustering.json"
            dataset_formatting:
              enabled: true
              techniques:
                x_y_separation:
                  enabled: false
                  params: { target_col: null }
                save_auxiliary_labels: # NUEVO — post-shuffle, ANTES del drop de IncidentGrade
                  enabled: true
                  params:
                    column: "IncidentGrade"
                    encoding:
                      FalsePositive: 0
                      BenignPositive: 1
                      TruePositive: 2
                    save_train: true
                    save_test: true
                  output_train: "3.5.dataset_formatting.save_auxiliary_labels.c_incident_grade_labels_train.parquet"
                  output_test: "3.5.dataset_formatting.save_auxiliary_labels.d_incident_grade_labels_test.parquet"
                type_casting:
                  enabled: true
                  params:
                    # 1. Alineación train/test — drop columnas extra en test
                    drop_columns:
                      - "Usage"              # extra en test, confirmado fase 2
                      - "IncidentGrade"      # drop post-shuffle, antes de array_conversion
                    # 2. Drop BIGINTs sin señal semántica para clustering
                    drop_bigint_no_signal:
                      - "DeviceId"
                      - "Sha256"
                      - "AccountSid"
                      - "AccountObjectId"
                      - "AccountName"
                      - "DeviceName"
                      - "NetworkMessageId"
                      - "RegistryKey"
                      - "RegistryValueName"
                      - "RegistryValueData"
                      - "ApplicationId"
                      - "ApplicationName"
                      - "OAuthApplicationId"
                      - "FileName"
                      - "FolderPath"
                      - "ResourceIdName"
                      - "CountryCode"
                      - "State"
                      - "City"
                      - "OSVersion"
                      - "Url_real"
                    # 3. Columnas object → frequency encoding antes de array_conversion
                    object_frequency_encode:
                      - "ResourceType"
                      - "Roles"
                      - "AntispamDirection"
                    fit_on: "train"
                    # 4. Float64 → Float32
                    float64_to_float32:
                      - "n_evidences_per_incident"
                      - "n_alerts_per_incident"
                      - "n_unique_entity_types"
                      - "Timestamp_hour"
                      - "IpAddress"
                      - "Category"
                      - "EntityType"
                      - "EvidenceRole"
                      - "OSFamily"
                      - "DetectorId"
                      - "AlertTitle_real"
                      - "OrgId"
                      - "AccountUpn"
                    # 5. Flags binarias → bool
                    flag_to_bool:
                      - "Url_is_missing"
                      - "LastVerdict_is_missing"
                      - "SuspicionLevel_is_missing"
                      # AlertTitle_is_missing REMOVIDA — dropeada en 3.3

                    # 6. Ordinales int32 — mantener como int32
                    # SuspicionLevel y LastVerdict ya son int32, no necesitan cast
                  output: "3.5.dataset_formatting.type_casting.json"
                array_conversion:
                  enabled: true
                  params:
                    to_numpy: true
                    unified_dtype: "float32"  # bool y int32 se castean a float32 aquí
                  output: "3.5.dataset_formatting.array_conversion.json"
                sparse_dense_format:
                  enabled: false
                reshaping:
                  enabled: false

          output_artifacts:
            # --- DATA FINAL ---
            train_prepared: "3.5.data_formatting.a_train_prepared.parquet"
            test_prepared: "3.5.data_formatting.b_test_prepared.parquet"
            # --- EL CEREBRO DEL PIPELINE ---
            transformers_pipeline: "3.5.data_formatting.e_transformers_pipeline.pkl"

            # NUEVO: Solo labels + ID para alineación (no features)
            #auxiliary_labels_train: "3.5.data_formatting.auxiliary_labels_train.parquet"

            # --- METADATOS ---
            data_schema_final: "3.5.data_formatting.f_final_schema_report.json"
            pipeline_integrity_check: "3.5.data_formatting.g_serialization_log.json"


    # ════════════════════════════════════════════════════════════════════════════
    # PHASE 4: MODELING
    # ════════════════════════════════════════════════════════════════════════════
    phase4_data_modeling:
      enabled: true
      objective: "Train and optimize clustering algorithms"
      read_strategy:
        # Features para entrenamiento (X)
        input_source: "3.5.data_formatting.a_train_prepared.parquet"
        #  Labels para validación externa (Y)
        auxiliary_labels: "3.5.dataset_formatting.save_auxiliary_labels.c_incident_grade_labels_train.parquet"
        input_shape:
          - 198886
          - 18
        dtype: float32
      steps:
        # ──────────────────────────────────────────────────────────────────────
        # STEP 4.1: ALGORITHM SELECTION
        # ──────────────────────────────────────────────────────────────────────
        step_4_1_algorithm_selection:
          enabled: true
          description: "Select clustering techniques to train"
          methods:
            algorithm_selection:
              techniques:
                kmeans:
                  enabled: true
                  priority: 1
                  output: "4.1.algorithm_selection.kmeans.json"
                dbscan:
                  enabled: true
                  priority: 2
                  output: "4.1.algorithm_selection.dbscan.json"
          output_artifacts:
            algorithms_selected: "4.1.algorithm_selection.summary.json"  # ya existe implícito en kmeans+dbscan json
        step_4_2_pretrain_analysis:
          enabled: true
          description: "k-NN distance analysis para eps de DBSCAN"
          depends_on: "step_4_1_algorithm_selection"
          methods:
            knn_distance_analysis:
              techniques:
                knn_distances:
                  enabled: true
                  params:
                    k: 5
                    metric: ["euclidean"]
                    sample_size: 20000
                    random_state: 7
                    percentiles:
                      - 10
                      - 25
                      - 50
                      - 75
                      - 90
                      - 95
                      - 99
                  output_stats: "4.2.pretrain_analysis.knn_distances.stats.json"
                  output_plot: "4.2.pretrain_analysis.knn_distances.elbow.png"
                  output_eps_suggested: "4.2.pretrain_analysis.eps_suggested.json"
          output_artifacts:
            eps_recommendation: "4.2.pretrain_analysis.eps_recommendation.json"
            knn_distance_summary: "4.2.pretrain_analysis.knn_distance_summary.json"
            sample_metadata: "4.2.pretrain_analysis.sample_metadata.json"
            eps_validation_preview: "4.2.pretrain_analysis.eps_validation_preview.json"
        # ──────────────────────────────────────────────────────────────────────
        # STEP 4.2: MODEL TRAINING
        # ──────────────────────────────────────────────────────────────────────
        step_4_3_model_training:
          enabled: true
          description: "Train models with hyperparameter tuning"
          methods:
            model_training:
              techniques:
                fit:
                  enabled: true
                  params:
                    fit_best_only: true
                    store_all_models: false
                    max_training_rows: 30000 # add
                    named_variants:
                      kmeans_n2: { n_clusters: 2 }
                      kmeans_n3: { n_clusters: 3 }
                  output: "4.3.model_training.fit.pkl"
                hyperparameter_tuning:
                  enabled: true
                  params:
                    strategy: "grid"  # TODO: grid or random
                    scoring: "silhouette"  # TODO: silhouette, davies_bouldin, calinski
                    refit: true

                    # NUEVO — subsample solo para grid search, fit final sobre datos completos
                    grid_search_sample_size: 15000  # Bajalo de 30k a 15k
                    metrics_sample_size: 5000       # Bajalo de 10k a 5k
                    random_state: 7

                    grids:
                      kmeans:
                        n_clusters: [2, 3, 4, 5]
                        init: ["k-means++"]
                        max_iter: [300]
                        random_state: [7]
                        output: "4.3.model_training.hyperparameter_tuning.kmeans.json"

                      dbscan:
                        eps: [0.1, 0.2, 0.3, 0.5] # p50, p75, p90, p95, p99
                        min_samples: [10, 25, 50]  # TODO: [3, 5, 10]
                        metric: ["euclidean"]
                        output: "4.3.model_training.hyperparameter_tuning.dbscan.json"
          output_artifacts:
            best_model: "4.3.model_training.best_model.pkl"
            model_card: "4.3.model_training.model_card.json"
            validation_metrics: "4.3.model_training.validation_metrics.json"
            cluster_assignments_sample: "4.3.model_training.cluster_assignments_sample.parquet"
            cluster_centroids: "4.3.model_training.cluster_centroids.parquet"
            cluster_sizes: "4.3.model_training.cluster_sizes.json"
            hp_search_summary: "4.3.model_training.hp_search_summary.json"
            cluster_feature_profiles: "4.3.model_training.cluster_feature_profiles.json"
        # ──────────────────────────────────────────────────────────────────────
        # STEP 4.4: TEST DESIGN GENERATION
        # ──────────────────────────────────────────────────────────────────────
        step_4_4_test_design:
          enabled: true
          description: "Document evaluation strategy"

          # Expected configuration for validation
          __expected__:
            metrics:
              - silhouette
              - davies_bouldin
              - calinski_harabasz
              - adjusted_rand_index
            validation_approach: "unsupervised + supervised ground truth comparison"
            models_to_evaluate:
              - kmeans_n2
              - kmeans_n3
            # AJUSTE: evaluar n_clusters=2 Y n_clusters=3 — diferencia silhouette 0.008 es insignificante, n=3 responde pregunta estratégica TP/BP/FP

          output_artifacts:
            evaluation_plan: "4.4.test_design.evaluation_plan.json"

        # ──────────────────────────────────────────────────────────────────────
        # STEP 4.5: MODEL EVALUATION
        # ──────────────────────────────────────────────────────────────────────
        step_4_5_model_evaluation:
          enabled: true
          description: "Evaluate clustering quality per model variant"

          methods:
            model_evaluation:
              techniques:
                # ──────────────────────────────────────────────────────────────
                # Métricas explícitas por modelo (kmeans_n2 vs kmeans_n3)
                # ──────────────────────────────────────────────────────────────
                silhouette:
                  enabled: true
                  targets: [ "kmeans_n2", "kmeans_n3" ]
                  params:
                    sample_size: 20000
                    metric: "euclidean"
                  output:
                    kmeans_n2: "4.5.model_evaluation.silhouette.kmeans_n2.json"
                    kmeans_n3: "4.5.model_evaluation.silhouette.kmeans_n3.json"

                davies_bouldin:
                  enabled: true
                  targets: [ "kmeans_n2", "kmeans_n3" ]
                  params: { }  # Parámetros por defecto (lower is better)
                  output:
                    kmeans_n2: "4.5.model_evaluation.davies_bouldin.kmeans_n2.json"
                    kmeans_n3: "4.5.model_evaluation.davies_bouldin.kmeans_n3.json"

                calinski_harabasz:
                  enabled: true
                  targets: [ "kmeans_n2", "kmeans_n3" ]
                  params: { }  # Parámetros por defecto (higher is better)
                  output:
                    kmeans_n2: "4.5.model_evaluation.calinski_harabasz.kmeans_n2.json"
                    kmeans_n3: "4.5.model_evaluation.calinski_harabasz.kmeans_n3.json"

                adjusted_rand_index:
                  enabled: true
                  targets: [ "kmeans_n2", "kmeans_n3" ]
                  params:
                    ground_truth_source: "3.5.dataset_formatting.save_auxiliary_labels.c_incident_grade_labels_train.parquet"
                    # 3.5.data_formatting.c_incident_grade_labels_train.parquet
                    ground_truth_column: "IncidentGrade"
                    encoding:
                      "FalsePositive": 0
                      "BenignPositive": 1
                      "TruePositive": 2
                  output:
                    kmeans_n2: "4.5.model_evaluation.ari.kmeans_n2.json"
                    kmeans_n3: "4.5.model_evaluation.ari.kmeans_n3.json"

                cluster_profiling:
                  enabled: true
                  targets: [ "kmeans_n2", "kmeans_n3" ]
                  params:
                    samples_per_cluster: 100
                    top_features: 10
                    export_cluster_subsets: true        # NUEVO
                    subset_sample_size: 5000            # filas por cluster exportadas
                    subset_format: "parquet"
                    # NUEVO: top_features — las 10 features más discriminantes por cluster, crítico para fase 5
                  output:
                    kmeans_n2: "4.5.model_evaluation.profiling.kmeans_n2.json"
                    kmeans_n3: "4.5.model_evaluation.profiling.kmeans_n3.json"

                dbscan:
                  enabled: false
                  # DESHABILITADO: 1093 clusters, scores negativos, no aporta a fase 5

          # ──────────────────────────────────────────────────────────────────────
          # Artifacts consolidados para consumo downstream (Fase 5 y Reporting)
          # ──────────────────────────────────────────────────────────────────────
          output_artifacts:
            cluster_labels: "4.5.model_evaluation.cluster_labels.parquet"
            # CRÍTICO — input directo fase 5, asignación cluster por fila (modelo ganador)

            summary_comparison: "4.5.model_evaluation.summary.json"
            # CRÍTICO — go/no-go fase 5, comparación directa n2 vs n3 con decisión automática

            consolidated_ari: "4.5.model_evaluation.ari_consolidated.json"
            # CRÍTICO — responde pregunta estratégica TP/BP/FP (unifica ambos modelos)

            consolidated_profiling: "4.5.model_evaluation.profiling_consolidated.json"
            # CRÍTICO — features dominantes por cluster para interpretación fase 5

            cluster_subsets_n2: "4.5.model_evaluation.cluster_subsets.kmeans_n2.parquet"
            cluster_subsets_n3: "4.5.model_evaluation.cluster_subsets.kmeans_n3.parquet"
            # datasets pequeños por cluster — solicitado por profesor

    # ════════════════════════════════════════════════════════════════════════════
    # PHASE 5: EVALUATION & INTERPRETATION
    # ════════════════════════════════════════════════════════════════════════════
    phase5_evaluation_and_interpretation:
      enabled: true
      objective: "Extract actionable security insights and validate business value of clustering results"

      read_strategy:
        train_features: "3.5.data_formatting.a_train_prepared.parquet"
        train_labels: "3.5.dataset_formatting.save_auxiliary_labels.c_incident_grade_labels_train.parquet"
        cluster_assignments: "4.3.model_training.cluster_assignments_sample.parquet"
        best_models: "4.3.model_training.best_model.pkl"
        profiling_n2: "4.5.model_evaluation.profiling.kmeans_n2.json"
        profiling_n3: "4.5.model_evaluation.profiling.kmeans_n3.json"
        evaluation_summary: "4.5.model_evaluation.summary.json"
        ari_consolidated: "4.5.model_evaluation.ari_consolidated.json"
        test_set_note: "Test set not used in unsupervised clustering — reserved for supervised deployment phase"

      steps:

        step_5_1_interpretation:
          enabled: true
          description: "Profile and interpret dominant threat patterns per cluster"
          methods:
            cluster_interpretation:
              techniques:
                kmeans_n2_profiling:
                  enabled: true
                  params:
                    source: "4.5.model_evaluation.profiling.kmeans_n2.json"
                    top_features: 10
                    feature_names_source: "3.5.data_formatting.f_final_schema_report.json"
                  output: "5.1.interpretation.kmeans_n2_profiles.json"
                kmeans_n3_profiling:
                  enabled: true
                  params:
                    source: "4.5.model_evaluation.profiling.kmeans_n3.json"
                    top_features: 10
                    feature_names_source: "3.5.data_formatting.f_final_schema_report.json"
                  output: "5.1.interpretation.kmeans_n3_profiles.json"
          output_artifacts:
            threat_knowledge_base: "5.1.interpretation.final_cluster_rules.json"

        step_5_2_business_evaluation:
          enabled: true
          description: "Confusion matrices and cluster vs IncidentGrade alignment"
          methods:
            business_alignment:
              techniques:
                kmeans_n2_confusion_matrix:
                  enabled: true
                  params:
                    cluster_source: "kmeans_n2"
                    target_column: "label"
                    normalize: "pred"
                  output: "5.2.business_evaluation.confusion_matrix.kmeans_n2.json"
                kmeans_n3_confusion_matrix:
                  enabled: true
                  params:
                    cluster_source: "kmeans_n3"
                    target_column: "label"
                    normalize: "pred"
                  output: "5.2.business_evaluation.confusion_matrix.kmeans_n3.json"
                dbscan_confusion_matrix:
                  enabled: true
                  params:
                    cluster_source: "dbscan"
                    target_column: "label"
                    normalize: "pred"
                    collapse_top_n: 5
                  output: "5.2.business_evaluation.confusion_matrix.dbscan_collapsed.json"
                crosstab_distribution:
                  enabled: true
                  params:
                    plot_type: "stacked_bar"
                    targets: [ "kmeans_n2", "kmeans_n3" ]
                  output: "5.2.business_evaluation.alignment_chart.png"
          output_artifacts:
            confusion_matrices: "5.2.business_evaluation.soc_confusion_matrices.json"
            alignment_plot: "5.2.business_evaluation.cluster_vs_target.png"

        step_5_3_process_audit:
          enabled: true
          description: "Audit reproducibility, leakage risks and data lineage"
          methods:
            reproducibility_audit:
              techniques:
                leakage_sanity_check:
                  enabled: true
                  params:
                    checked_features: [ "SuspicionLevel", "LastVerdict" ]
                    leakage_risk: "suspect"
                  output: "5.3.process_audit.leakage_results.json"
                reproducibility_check:
                  enabled: true
                  params:
                    target_seed: 7
                    artifacts_to_verify:
                      - "3.5.data_formatting.a_train_prepared.parquet"
                      - "4.3.model_training.best_model.pkl"
                      - "4.5.model_evaluation.summary.json"
                  output: "5.3.process_audit.seed_validation.json"
          output_artifacts:
            reproducibility_certificate: "5.3.process_audit.reproducibility_report.json"

        step_5_4_decision_making:
          enabled: true
          description: "Deployment readiness assessment and recommendations"
          methods:
            downstream_strategy:
              techniques:
                evaluate_deployment_readiness:
                  enabled: true
                  params:
                    min_ari_threshold: 0.05
                    winning_model_criteria: "ari_score"
                    document_limitations: true
                    test_set_status: "reserved — not used in unsupervised clustering phase"
                  output: "5.4.decision_making.readiness_metrics.json"
                recommendations:
                  enabled: true
                  params:
                    include_deployment_considerations: true
                    include_monitoring_suggestions: true
                  output: "5.4.decision_making.recommendations.json"
          output_artifacts:
            deployment_readiness: "5.4.decision_making.readiness_metrics.json"
            recommendations: "5.4.decision_making.recommendations.json"